<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YT Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080810;
  --surface:  #0f0f1a;
  --card:     #13131f;
  --border:   #1e1e30;
  --accent:   #ff3c3c;
  --accent2:  #ff7b00;
  --green:    #00e87a;
  --blue:     #3c8eff;
  --white:    #eeeef5;
  --muted:    #55556a;
  --mono:     'DM Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --display:  'Bebas Neue', sans-serif;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--white);
  font-family: var(--sans);
  overflow-x: hidden;
}

/* animated grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,60,60,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,60,60,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -30vh; left: 50%;
  transform: translateX(-50%);
  width: 80vw; height: 60vh;
  background: radial-gradient(ellipse, rgba(255,60,60,.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 660px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 44px;
  animation: fadeUp .6s ease both;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.logo-icon {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 30px rgba(255,60,60,.4);
}

h1 {
  font-family: var(--display);
  font-size: 52px;
  letter-spacing: 2px;
  line-height: 1;
}

h1 span { color: var(--accent); }

.tagline {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 16px;
  animation: fadeUp .6s ease both;
}

.card:nth-child(2) { animation-delay: .1s; }
.card:nth-child(3) { animation-delay: .2s; }
.card:nth-child(4) { animation-delay: .3s; }

.card-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.card-label::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
}

/* ── URL INPUT ── */
.url-row {
  display: flex; gap: 10px;
}

input[type=text] {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--white);
  font-family: var(--mono);
  font-size: 13px;
  padding: 14px 16px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}

input[type=text]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,60,60,.12);
}

input[type=text]::placeholder { color: var(--muted); }

/* ── FORMAT TABS ── */
.fmt-tabs {
  display: flex; gap: 8px;
  margin-bottom: 0;
}

.fmt-tab {
  flex: 1;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  user-select: none;
}

.fmt-tab:hover { color: var(--white); border-color: #2e2e45; }

.fmt-tab.active {
  background: rgba(255,60,60,.1);
  border-color: var(--accent);
  color: var(--white);
}

.fmt-tab .fmt-icon { font-size: 18px; display: block; margin-bottom: 4px; }
.fmt-tab .fmt-name { font-size: 12px; letter-spacing: 1px; }

/* ── QUALITY GRID ── */
.quality-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.q-btn {
  padding: 10px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  user-select: none;
}

.q-btn:hover { color: var(--white); border-color: #2e2e45; }

.q-btn.active {
  border-color: var(--accent);
  background: rgba(255,60,60,.08);
  color: var(--white);
}

.q-btn .q-res { display: block; font-size: 15px; font-weight: 700; font-family: var(--sans); color: var(--white); margin-bottom: 2px; }
.q-btn.active .q-res { color: var(--accent); }

/* ── DOWNLOAD BUTTON ── */
#dlBtn {
  width: 100%;
  padding: 18px;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .2s;
  box-shadow: 0 4px 30px rgba(255,60,60,.35);
  margin-bottom: 16px;
  animation: fadeUp .6s .35s ease both;
}

#dlBtn:hover {
  background: #e02020;
  box-shadow: 0 6px 40px rgba(255,60,60,.5);
}

#dlBtn:active { transform: scale(.98); }
#dlBtn:disabled { background: #333; box-shadow: none; cursor: not-allowed; color: #666; }

/* ── PROGRESS CARD ── */
#progressCard {
  display: none;
  animation: fadeUp .4s ease both;
}

#progressCard.show { display: block; }

.prog-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.prog-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}

.prog-status {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 1px;
}

.prog-status.done { color: var(--green); }
.prog-status.error { color: #ff6b6b; }

/* progress bar */
.bar-track {
  height: 6px;
  background: var(--surface);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 14px;
}

.bar-fill {
  height: 100%;
  width: 0%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .3s ease;
  position: relative;
}

.bar-fill.indeterminate {
  width: 40% !important;
  animation: indeterminate 1.4s ease infinite;
}

.bar-fill.complete {
  background: linear-gradient(90deg, var(--green), #00c566);
  width: 100% !important;
}

@keyframes indeterminate {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

/* stats row */
.stats-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.stat {
  flex: 1;
  min-width: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
}

.stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--white);
}

.stat-value.green { color: var(--green); }
.stat-value.red   { color: var(--accent); }
.stat-value.blue  { color: var(--blue); }

/* log terminal */
.terminal {
  background: #050508;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  max-height: 160px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.7;
  color: #4a4a6a;
}

.terminal .log-line { color: #4a4a6a; }
.terminal .log-dl   { color: var(--green); }
.terminal .log-warn { color: #ffd60a; }
.terminal .log-err  { color: var(--accent); }
.terminal .log-merge{ color: var(--blue); }

.terminal::-webkit-scrollbar { width: 4px; }
.terminal::-webkit-scrollbar-track { background: transparent; }
.terminal::-webkit-scrollbar-thumb { background: #222; border-radius: 99px; }

/* success banner */
.success-banner {
  display: none;
  background: rgba(0,232,122,.08);
  border: 1px solid rgba(0,232,122,.3);
  border-radius: 12px;
  padding: 16px 20px;
  margin-top: 14px;
  font-size: 14px;
  color: var(--green);
}

.success-banner.show { display: flex; align-items: center; gap: 10px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 500px) {
  h1 { font-size: 40px; }
  .quality-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { gap: 8px; }
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">▶</div>
    </div>
    <h1>YT<span>DOWN</span></h1>
    <p class="tagline">fast · free · no commands</p>
  </header>

  <!-- URL -->
  <div class="card">
    <div class="card-label">Video URL</div>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="Paste YouTube link here…"/>
    </div>
  </div>

  <!-- Format -->
  <div class="card">
    <div class="card-label">Format</div>
    <div class="fmt-tabs">
      <div class="fmt-tab active" data-fmt="mp4" onclick="setFormat(this)">
        <span class="fmt-icon">🎬</span>
        <span class="fmt-name">MP4 VIDEO</span>
      </div>
      <div class="fmt-tab" data-fmt="mp3" onclick="setFormat(this)">
        <span class="fmt-icon">🎵</span>
        <span class="fmt-name">MP3 AUDIO</span>
      </div>
    </div>
  </div>

  <!-- Quality (hidden for mp3) -->
  <div class="card" id="qualityCard">
    <div class="card-label">Quality</div>
    <div class="quality-grid">
      <div class="q-btn active" data-q="bestvideo+bestaudio/best" onclick="setQuality(this)">
        <span class="q-res">AUTO</span>best
      </div>
      <div class="q-btn" data-q="bestvideo[height<=2160]+bestaudio/best" onclick="setQuality(this)">
        <span class="q-res">4K</span>2160p
      </div>
      <div class="q-btn" data-q="bestvideo[height<=1080]+bestaudio/best" onclick="setQuality(this)">
        <span class="q-res">1080p</span>Full HD
      </div>
      <div class="q-btn" data-q="bestvideo[height<=720]+bestaudio/best" onclick="setQuality(this)">
        <span class="q-res">720p</span>HD
      </div>
      <div class="q-btn" data-q="bestvideo[height<=480]+bestaudio/best" onclick="setQuality(this)">
        <span class="q-res">480p</span>medium
      </div>
      <div class="q-btn" data-q="bestvideo[height<=144]+bestaudio/best" onclick="setQuality(this)">
        <span class="q-res">144p</span>smallest
      </div>
    </div>
  </div>

  <!-- Download button -->
  <button id="dlBtn" onclick="startDownload()">⬇ DOWNLOAD</button>

  <!-- Progress card -->
  <div class="card" id="progressCard">
    <div class="prog-header">
      <div class="prog-title" id="progTitle">Preparing…</div>
      <div class="prog-status" id="progStatus">CONNECTING</div>
    </div>

    <div class="bar-track">
      <div class="bar-fill indeterminate" id="barFill"></div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Progress</div>
        <div class="stat-value red" id="statPct">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Speed</div>
        <div class="stat-value blue" id="statSpeed">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">ETA</div>
        <div class="stat-value" id="statEta">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Size</div>
        <div class="stat-value" id="statSize">—</div>
      </div>
    </div>

    <div class="terminal" id="terminal"></div>

    <div class="success-banner" id="successBanner">
      ✅ Download complete! File saved to your Downloads folder.
    </div>
  </div>

</div>

<script>
let selectedFormat  = "mp4";
let selectedQuality = "bestvideo+bestaudio/best";

function setFormat(el) {
  document.querySelectorAll(".fmt-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  selectedFormat = el.dataset.fmt;
  document.getElementById("qualityCard").style.display =
    selectedFormat === "mp3" ? "none" : "block";
}

function setQuality(el) {
  document.querySelectorAll(".q-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  selectedQuality = el.dataset.q;
}

function addLog(text, cls = "log-line") {
  const t = document.getElementById("terminal");
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = text;
  t.appendChild(d);
  t.scrollTop = t.scrollHeight;
}

function classifyLine(line) {
  if (line.includes("[download]") && line.includes("%")) return "log-dl";
  if (line.includes("[Merger]") || line.includes("[ffmpeg]"))  return "log-merge";
  if (line.toLowerCase().includes("warning")) return "log-warn";
  if (line.toLowerCase().includes("error"))   return "log-err";
  return "log-line";
}

// Parse yt-dlp progress line:
// [download]  45.3% of  123.45MiB at   2.30MiB/s ETA 00:32
const RE = /(\d+\.?\d*)%\s+of\s+([\d.]+\s*\S+)\s+at\s+([\d.]+\s*\S+\/s)\s+ETA\s+(\S+)/;

function parseLine(line) {
  const m = line.match(RE);
  if (!m) return null;
  return { pct: parseFloat(m[1]), size: m[2], speed: m[3], eta: m[4] };
}

function startDownload() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url || url === "") {
    document.getElementById("urlInput").focus();
    document.getElementById("urlInput").style.borderColor = "var(--accent)";
    setTimeout(() => document.getElementById("urlInput").style.borderColor = "", 1500);
    return;
  }

  // Reset UI
  document.getElementById("terminal").innerHTML = "";
  document.getElementById("successBanner").classList.remove("show");
  document.getElementById("barFill").className = "bar-fill indeterminate";
  document.getElementById("statPct").textContent   = "—";
  document.getElementById("statSpeed").textContent = "—";
  document.getElementById("statEta").textContent   = "—";
  document.getElementById("statSize").textContent  = "—";
  document.getElementById("progStatus").textContent = "CONNECTING";
  document.getElementById("progStatus").className = "prog-status";
  document.getElementById("progTitle").textContent = "Preparing…";
  document.getElementById("progressCard").classList.add("show");
  document.getElementById("dlBtn").disabled = true;
  document.getElementById("dlBtn").textContent = "DOWNLOADING…";

  const params = new URLSearchParams({
    url,
    format:  selectedFormat,
    quality: selectedQuality,
  });

  const es = new EventSource(`/download?${params}`);

  es.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "log") {
      const line = data.line;
      const cls  = classifyLine(line);
      addLog(line, cls);

      // Extract video title
      const titleMatch = line.match(/\[download\] Destination: .+[/\\](.+)\./);
      if (titleMatch) {
        document.getElementById("progTitle").textContent = titleMatch[1];
      }

      // Parse progress
      const prog = parseLine(line);
      if (prog) {
        document.getElementById("barFill").className = "bar-fill";
        document.getElementById("barFill").style.width = prog.pct + "%";
        document.getElementById("statPct").textContent   = prog.pct.toFixed(1) + "%";
        document.getElementById("statSpeed").textContent = prog.speed;
        document.getElementById("statEta").textContent   = prog.eta;
        document.getElementById("statSize").textContent  = prog.size;
        document.getElementById("progStatus").textContent = "DOWNLOADING";
      }

      // Merging
      if (line.includes("[Merger]") || line.includes("Merging")) {
        document.getElementById("barFill").className = "bar-fill indeterminate";
        document.getElementById("progStatus").textContent = "MERGING";
        document.getElementById("progTitle").textContent = "Merging video + audio…";
      }
    }

    if (data.type === "done") {
      es.close();
      const ok = data.code === 0;
      document.getElementById("barFill").className = ok ? "bar-fill complete" : "bar-fill";
      if (!ok) document.getElementById("barFill").style.width = "100%";

      document.getElementById("progStatus").textContent = ok ? "COMPLETE ✓" : "FAILED ✗";
      document.getElementById("progStatus").className =
        "prog-status " + (ok ? "done" : "error");

      if (ok) {
        document.getElementById("statPct").textContent = "100%";
        document.getElementById("progTitle").textContent = "Download complete!";
        document.getElementById("successBanner").classList.add("show");
        addLog(`✅ Saved to: ${data.dir}`, "log-dl");
      } else {
        document.getElementById("progTitle").textContent = "Download failed.";
        addLog("❌ Download failed. Check the log above.", "log-err");
      }

      document.getElementById("dlBtn").disabled = false;
      document.getElementById("dlBtn").textContent = "⬇ DOWNLOAD";
    }

    if (data.type === "error") {
      es.close();
      addLog("❌ " + data.message, "log-err");
      document.getElementById("progStatus").textContent = "ERROR";
      document.getElementById("progStatus").className = "prog-status error";
      document.getElementById("dlBtn").disabled = false;
      document.getElementById("dlBtn").textContent = "⬇ DOWNLOAD";
    }
  };

  es.onerror = () => {
    es.close();
    addLog("❌ Cannot connect to server. Is server.py running?", "log-err");
    document.getElementById("progStatus").textContent = "NO SERVER";
    document.getElementById("progStatus").className = "prog-status error";
    document.getElementById("dlBtn").disabled = false;
    document.getElementById("dlBtn").textContent = "⬇ DOWNLOAD";
  };
}

// Allow Enter key
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") startDownload();
  });
});
</script>
</body>
</html>
